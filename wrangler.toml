name = "vino-api"
main = "vino-worker.js"
compatibility_date = "2024-01-01"

# ── D1 Database ──────────────────────────────────────────────────
# After running: wrangler d1 create vino-realty
# Copy the database_id shown and paste it below
[[d1_databases]]
binding = "DB"
database_name = "vino-realty"
database_id   = "YOUR_D1_DATABASE_ID"   # ← replace this

# ── R2 Bucket ────────────────────────────────────────────────────
# After running: wrangler r2 bucket create vino-photos
[[r2_buckets]]
binding     = "PHOTOS"
bucket_name = "vino-photos"

# ── Environment Variables ────────────────────────────────────────
[vars]
# Public URL for your R2 bucket.
# Enable "Public access" in R2 dashboard → copy the r2.dev URL.
R2_PUBLIC_URL  = "https://pub-XXXX.r2.dev"   # ← replace this

# Your website's domain (for CORS). Use "*" to allow all origins during dev.
ALLOWED_ORIGIN = "https://vino.properties"   # ← replace this
