name = "vino-api"
main = "index.js"
compatibility_date = "2024-09-01"

# D1 binding — replace database_id after you create the DB (see README step 3)
[[d1_databases]]
binding = "DB"
database_name = "vino-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# R2 binding — for property photos (see README step 3b)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "vino-photos"

# Optional: if you make the bucket public (or attach a custom domain),
# set its public URL here so photos are served straight from R2/CDN
# instead of through this Worker. Leave commented to serve via the Worker
# at <worker-url>/r2/<key>.
# [vars]
# PHOTO_BASE_URL = "https://pub-xxxxxxxx.r2.dev"

# Secrets (do NOT put real values here — set them with `wrangler secret put`):
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put AUTH_SALT
# AUTH_SALT can be any long random string; keep it stable or all existing
# password hashes become invalid.
