name = "vino-realty"
main = "worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "."

# ─────────────────────────────────────────────────────────
# DO NOT add D1/R2 bindings here.
# Add them in Cloudflare Dashboard:
#   Workers & Pages → vino-realty → Settings → Bindings
#
#   D1 Database  → Variable name: DB     → select your DB
#   R2 Bucket    → Variable name: PHOTOS → select your bucket
#   Variable     → R2_PUBLIC_URL         → https://pub-XXXX.r2.dev
# ─────────────────────────────────────────────────────────
